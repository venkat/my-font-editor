<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Touch Edit Test — iPad</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; }

.topbar {
  height: 48px; display: flex; align-items: center; gap: 12px;
  padding: 0 12px; background: #16213e; font-size: 13px;
}
.topbar button {
  padding: 6px 16px; border: none; border-radius: 4px; background: #e94560; color: #fff;
  font-size: 13px; cursor: pointer;
}
.topbar button.mode { background: #333; }
.topbar button.mode.active { background: #4c1d95; }
.topbar .info { color: #888; font-family: monospace; font-size: 11px; margin-left: auto; }

svg { display: block; width: 100%; height: calc(100dvh - 48px); background: #0f0f23; }
</style>
</head>
<body>

<div class="topbar">
  <button id="drawBtn" class="mode active">Draw</button>
  <button id="editBtn" class="mode">Edit</button>
  <button id="undoBtn">Undo</button>
  <button id="resetBtn">Reset</button>
  <span class="info" id="infoDisplay"></span>
</div>

<svg id="canvas" viewBox="0 0 200 373" preserveAspectRatio="xMidYMid meet">
  <g id="dots"></g>
  <g id="strokes"></g>
  <g id="preview"></g>
  <g id="selection"></g>
  <g id="debug"></g>
</svg>

<script>
// ═══════════════════════════════════════════════════════
// TOUCH EDIT TEST — iPad-only, closest-match debugging
// Strategy B (Sticky DRAG_PENDING) only
// ═══════════════════════════════════════════════════════

const SP = 31;
const MX = 38;
const MY = 12;
const COLS = 4;
const ROWS_START = 1;
const ROWS_END = 11;

const svg = document.getElementById('canvas');
const dotsG = document.getElementById('dots');
const strokesG = document.getElementById('strokes');
const previewG = document.getElementById('preview');
const selectionG = document.getElementById('selection');
const debugG = document.getElementById('debug');
const infoDisplay = document.getElementById('infoDisplay');
const drawBtn = document.getElementById('drawBtn');
const editBtn = document.getElementById('editBtn');

// ═══════════════════════════════════════════════════════
// SCREEN-PIXEL THRESHOLDS (converted to SVG at each event)
// At iPad 768px: scale ≈ 0.26, so 60px screen ≈ 15.6px SVG
// ═══════════════════════════════════════════════════════
const SCREEN_ENDPOINT_RADIUS = 60;
const SCREEN_STROKE_MID_THRESH = 50;
const SCREEN_TAP_THRESH = 30;
const SCREEN_DRAG_PROMOTE = 10;

function getScale() {
  return svg.viewBox.baseVal.width / svg.getBoundingClientRect().width;
}

function svgThresholds() {
  const s = getScale();
  return {
    endpointRadius: SCREEN_ENDPOINT_RADIUS * s,
    strokeMidThresh: SCREEN_STROKE_MID_THRESH * s,
    tapThresh: SCREEN_TAP_THRESH * s,
    dragPromote: SCREEN_DRAG_PROMOTE * s,
    scale: s
  };
}

function updateInfo() {
  const t = svgThresholds();
  infoDisplay.textContent =
    `${mode} | scale:${t.scale.toFixed(3)}  ep:${t.endpointRadius.toFixed(1)}  mid:${t.strokeMidThresh.toFixed(1)}  tap:${t.tapThresh.toFixed(1)}`;
}

// ═══════════════════════════════════════════════════════
// TEST STROKES (designed for ambiguous selection)
// ═══════════════════════════════════════════════════════
const initialStrokes = [
  // 0: Vertical, col 1, rows 1-7 — parallel pair with stroke 1
  { x1: 69, y1: 43, x2: 69, y2: 229, curved: false },
  // 1: Vertical, col 2, rows 1-7 — 31px from stroke 0 (the exact bug)
  { x1: 100, y1: 43, x2: 100, y2: 229, curved: false },
  // 2: Diagonal crossing both verticals — triple overlap zone
  { x1: 38, y1: 167, x2: 131, y2: 105, curved: false },
  // 3: Short horizontal, col 3-4, row 6
  { x1: 131, y1: 198, x2: 162, y2: 198, curved: false },
  // 4: Curved, col 3, rows 8-10
  { x1: 131, y1: 260, x2: 131, y2: 322, curved: true, cx: 162, cy: 291 },
];

let strokes = JSON.parse(JSON.stringify(initialStrokes));

// ═══════════════════════════════════════════════════════
// STATE (Strategy B: Sticky DRAG_PENDING)
// IDLE → EDIT_PENDING → SELECTED → DRAG_PENDING → DRAGGING
// ═══════════════════════════════════════════════════════
let mode = 'DRAW';  // 'DRAW' or 'EDIT'
let state = 'IDLE';
let selectedItem = null;  // { type: 'dot'|'stroke', strokeIdx, endpoint?, x?, y? }
let dragInfo = null;
let pressStart = null;
let undoStack = [];
let lastCandidates = [];  // for debug visualization

// Draw mode state
let drawStartDot = null;  // grid dot where drawing started
let drawHoverDot = null;  // grid dot being hovered during draw
let previewLineEl = null; // SVG line element for live preview

let strokeEls = [];
let dotEls = [];
let gridDotEls = {}; // key: "x,y" → circle element

// ═══════════════════════════════════════════════════════
// SVG COORDINATE CONVERSION
// ═══════════════════════════════════════════════════════
function svgPt(clientX, clientY) {
  const pt = svg.createSVGPoint();
  pt.x = clientX;
  pt.y = clientY;
  const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
  return { x: svgP.x, y: svgP.y };
}

// ═══════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════
function buildScene() {
  dotsG.innerHTML = '';
  strokesG.innerHTML = '';
  previewG.innerHTML = '';
  strokeEls = [];
  dotEls = [];
  gridDotEls = {};

  // Grid dots (background — drawn under strokes)
  for (let c = 0; c <= COLS; c++) {
    for (let r = ROWS_START; r <= ROWS_END; r++) {
      const x = MX + c * SP, y = MY + r * SP;
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', 3);
      circle.setAttribute('fill', '#555');
      dotsG.appendChild(circle);
      gridDotEls[`${x},${y}`] = circle;
    }
  }

  // Strokes
  strokes.forEach(s => {
    const el = createStrokeEl(s);
    strokesG.appendChild(el);
    strokeEls.push(el);
  });

  // Preview line (persistent element, hidden by default)
  previewLineEl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  previewLineEl.setAttribute('stroke', '#ccc');
  previewLineEl.setAttribute('stroke-width', 11);
  previewLineEl.setAttribute('stroke-linecap', 'round');
  previewLineEl.setAttribute('opacity', '0.4');
  previewLineEl.setAttribute('display', 'none');
  previewLineEl.setAttribute('pointer-events', 'none');
  previewG.appendChild(previewLineEl);

  drawEndpointDots();
  buildSelectionEls();
  buildDebugEls();
}

function createStrokeEl(s) {
  if (s.curved) {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${s.x1},${s.y1} Q${s.cx},${s.cy} ${s.x2},${s.y2}`);
    path.setAttribute('stroke', '#ccc');
    path.setAttribute('stroke-width', 11);
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('fill', 'none');
    return path;
  } else {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', s.x1); line.setAttribute('y1', s.y1);
    line.setAttribute('x2', s.x2); line.setAttribute('y2', s.y2);
    line.setAttribute('stroke', '#ccc');
    line.setAttribute('stroke-width', 11);
    line.setAttribute('stroke-linecap', 'round');
    return line;
  }
}

function drawEndpointDots() {
  dotEls.forEach(el => el.remove());
  dotEls = [];

  const endpoints = new Map();
  strokes.forEach((s, i) => {
    const k1 = `${s.x1},${s.y1}`;
    const k2 = `${s.x2},${s.y2}`;
    if (!endpoints.has(k1)) endpoints.set(k1, { x: s.x1, y: s.y1 });
    if (!endpoints.has(k2)) endpoints.set(k2, { x: s.x2, y: s.y2 });
  });

  endpoints.forEach(({ x, y }) => {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', x);
    c.setAttribute('cy', y);
    c.setAttribute('r', 7);
    c.setAttribute('fill', '#a855f7');
    dotsG.appendChild(c);
    dotEls.push(c);
  });
}

// Update grid dot colors for draw mode visual feedback
function updateGridDotVisuals() {
  // Collect endpoints
  const endpoints = new Set();
  strokes.forEach(s => {
    endpoints.add(`${s.x1},${s.y1}`);
    endpoints.add(`${s.x2},${s.y2}`);
  });

  for (const [key, el] of Object.entries(gridDotEls)) {
    const isStart = drawStartDot && key === `${drawStartDot.x},${drawStartDot.y}`;
    const isHover = drawHoverDot && key === `${drawHoverDot.x},${drawHoverDot.y}`;
    const isEndpoint = endpoints.has(key);

    if (isStart) {
      el.setAttribute('fill', '#1e1b2e');
      el.setAttribute('r', 7);
    } else if (isHover && mode === 'DRAW') {
      el.setAttribute('fill', '#a78bfa');
      el.setAttribute('r', 8);
    } else if (isEndpoint) {
      el.setAttribute('fill', '#a855f7');
      el.setAttribute('r', 7);
    } else {
      el.setAttribute('fill', '#555');
      el.setAttribute('r', 3);
    }
  }
}

// Update the preview line during drawing
function updatePreviewLine() {
  if (!previewLineEl) return;
  if (!drawStartDot || mode !== 'DRAW') {
    previewLineEl.setAttribute('display', 'none');
    return;
  }
  const endX = drawHoverDot ? drawHoverDot.x : (pressStart ? pressStart.x : drawStartDot.x);
  const endY = drawHoverDot ? drawHoverDot.y : (pressStart ? pressStart.y : drawStartDot.y);
  if (endX === drawStartDot.x && endY === drawStartDot.y) {
    previewLineEl.setAttribute('display', 'none');
    return;
  }
  previewLineEl.setAttribute('x1', drawStartDot.x);
  previewLineEl.setAttribute('y1', drawStartDot.y);
  previewLineEl.setAttribute('x2', endX);
  previewLineEl.setAttribute('y2', endY);
  previewLineEl.setAttribute('display', 'block');
}

function updateStrokeEl(idx) {
  const s = strokes[idx];
  const el = strokeEls[idx];
  if (!el) return;
  if (s.curved) {
    // line→path swap if element is a <line>
    if (el.tagName === 'line') {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('stroke', '#ccc');
      path.setAttribute('stroke-width', 11);
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('fill', 'none');
      el.replaceWith(path);
      strokeEls[idx] = path;
    }
    strokeEls[idx].setAttribute('d', `M${s.x1},${s.y1} Q${s.cx},${s.cy} ${s.x2},${s.y2}`);
  } else {
    el.setAttribute('x1', s.x1); el.setAttribute('y1', s.y1);
    el.setAttribute('x2', s.x2); el.setAttribute('y2', s.y2);
  }
}

// ═══════════════════════════════════════════════════════
// SELECTION VISUALS
// ═══════════════════════════════════════════════════════
let selRing, selStrokeLine, selStrokePath, dragHandleEl;

function buildSelectionEls() {
  selectionG.innerHTML = '';

  // Dot selection ring
  selRing = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  selRing.setAttribute('r', 12);
  selRing.setAttribute('fill', 'none');
  selRing.setAttribute('stroke', '#e94560');
  selRing.setAttribute('stroke-width', 3);
  selRing.setAttribute('display', 'none');
  selectionG.appendChild(selRing);

  // Stroke selection highlight (line)
  selStrokeLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  selStrokeLine.setAttribute('stroke', '#e94560');
  selStrokeLine.setAttribute('stroke-width', 4);
  selStrokeLine.setAttribute('stroke-linecap', 'round');
  selStrokeLine.setAttribute('display', 'none');
  selectionG.appendChild(selStrokeLine);

  // Stroke selection highlight (path for curves)
  selStrokePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  selStrokePath.setAttribute('stroke', '#e94560');
  selStrokePath.setAttribute('stroke-width', 4);
  selStrokePath.setAttribute('stroke-linecap', 'round');
  selStrokePath.setAttribute('fill', 'none');
  selStrokePath.setAttribute('display', 'none');
  selectionG.appendChild(selStrokePath);

  // Red drag handle (always visible when selected)
  dragHandleEl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dragHandleEl.setAttribute('r', 14);
  dragHandleEl.setAttribute('fill', 'rgba(233,69,96,0.4)');
  dragHandleEl.setAttribute('stroke', '#e94560');
  dragHandleEl.setAttribute('stroke-width', 2);
  dragHandleEl.setAttribute('display', 'none');
  selectionG.appendChild(dragHandleEl);
}

function updateSelectionVisual() {
  if (!selectedItem) {
    selRing.setAttribute('display', 'none');
    selStrokeLine.setAttribute('display', 'none');
    selStrokePath.setAttribute('display', 'none');
    dragHandleEl.setAttribute('display', 'none');
    return;
  }

  if (selectedItem.type === 'dot') {
    selRing.setAttribute('cx', selectedItem.x);
    selRing.setAttribute('cy', selectedItem.y);
    selRing.setAttribute('display', 'block');
    selStrokeLine.setAttribute('display', 'none');
    selStrokePath.setAttribute('display', 'none');
    dragHandleEl.setAttribute('cx', selectedItem.x);
    dragHandleEl.setAttribute('cy', selectedItem.y);
    dragHandleEl.setAttribute('display', 'block');
  } else if (selectedItem.type === 'stroke') {
    selRing.setAttribute('display', 'none');
    const s = strokes[selectedItem.strokeIdx];
    if (s.curved) {
      selStrokeLine.setAttribute('display', 'none');
      selStrokePath.setAttribute('d', `M${s.x1},${s.y1} Q${s.cx},${s.cy} ${s.x2},${s.y2}`);
      selStrokePath.setAttribute('display', 'block');
    } else {
      selStrokePath.setAttribute('display', 'none');
      selStrokeLine.setAttribute('x1', s.x1); selStrokeLine.setAttribute('y1', s.y1);
      selStrokeLine.setAttribute('x2', s.x2); selStrokeLine.setAttribute('y2', s.y2);
      selStrokeLine.setAttribute('display', 'block');
    }
    // Visual midpoint: t=0.5 on bezier, not the control point
    let midX, midY;
    if (s.curved) {
      midX = 0.25 * s.x1 + 0.5 * s.cx + 0.25 * s.x2;
      midY = 0.25 * s.y1 + 0.5 * s.cy + 0.25 * s.y2;
    } else {
      midX = (s.x1 + s.x2) / 2;
      midY = (s.y1 + s.y2) / 2;
    }
    dragHandleEl.setAttribute('cx', midX);
    dragHandleEl.setAttribute('cy', midY);
    dragHandleEl.setAttribute('display', 'block');
  }
}

// ═══════════════════════════════════════════════════════
// DEBUG OVERLAYS (always visible in SVG)
// ═══════════════════════════════════════════════════════
let dbgThreshCircle, dbgCrossH, dbgCrossV, dbgCandidatesG;
let dbgStateText, dbgSelText, dbgDistText;

function buildDebugEls() {
  debugG.innerHTML = '';

  // Threshold circle at tap point (yellow semi-transparent)
  dbgThreshCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dbgThreshCircle.setAttribute('fill', 'rgba(255,255,0,0.08)');
  dbgThreshCircle.setAttribute('stroke', 'rgba(255,255,0,0.35)');
  dbgThreshCircle.setAttribute('stroke-width', 0.5);
  dbgThreshCircle.setAttribute('display', 'none');
  debugG.appendChild(dbgThreshCircle);

  // Crosshair at tap position
  dbgCrossH = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  dbgCrossH.setAttribute('stroke', 'rgba(255,255,0,0.6)');
  dbgCrossH.setAttribute('stroke-width', 0.5);
  dbgCrossH.setAttribute('display', 'none');
  debugG.appendChild(dbgCrossH);

  dbgCrossV = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  dbgCrossV.setAttribute('stroke', 'rgba(255,255,0,0.6)');
  dbgCrossV.setAttribute('stroke-width', 0.5);
  dbgCrossV.setAttribute('display', 'none');
  debugG.appendChild(dbgCrossV);

  // Group for candidate dots (green=winner, orange=losers)
  dbgCandidatesG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  debugG.appendChild(dbgCandidatesG);

  // Text labels in top-left
  dbgStateText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  dbgStateText.setAttribute('x', 4); dbgStateText.setAttribute('y', 12);
  dbgStateText.setAttribute('fill', '#0f0');
  dbgStateText.setAttribute('font-size', '7');
  dbgStateText.setAttribute('font-family', 'monospace');
  dbgStateText.textContent = 'IDLE';
  debugG.appendChild(dbgStateText);

  dbgSelText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  dbgSelText.setAttribute('x', 4); dbgSelText.setAttribute('y', 20);
  dbgSelText.setAttribute('fill', '#0f0');
  dbgSelText.setAttribute('font-size', '7');
  dbgSelText.setAttribute('font-family', 'monospace');
  debugG.appendChild(dbgSelText);

  dbgDistText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  dbgDistText.setAttribute('x', 4); dbgDistText.setAttribute('y', 28);
  dbgDistText.setAttribute('fill', '#0f0');
  dbgDistText.setAttribute('font-size', '7');
  dbgDistText.setAttribute('font-family', 'monospace');
  debugG.appendChild(dbgDistText);
}

function updateDebugOverlays(tapPt, threshold) {
  // Always update state/selection text
  dbgStateText.textContent = `${mode}:${state}`;

  if (selectedItem) {
    dbgSelText.textContent = selectedItem.type === 'dot'
      ? `sel: dot s${selectedItem.strokeIdx} ${selectedItem.endpoint}`
      : `sel: stroke ${selectedItem.strokeIdx}`;
  } else {
    dbgSelText.textContent = 'sel: none';
  }

  if (!tapPt) {
    dbgDistText.textContent = '';
    return;
  }

  // Threshold circle
  dbgThreshCircle.setAttribute('cx', tapPt.x);
  dbgThreshCircle.setAttribute('cy', tapPt.y);
  dbgThreshCircle.setAttribute('r', threshold || 15);
  dbgThreshCircle.setAttribute('display', 'block');

  // Crosshair
  const sz = 6;
  dbgCrossH.setAttribute('x1', tapPt.x - sz); dbgCrossH.setAttribute('y1', tapPt.y);
  dbgCrossH.setAttribute('x2', tapPt.x + sz); dbgCrossH.setAttribute('y2', tapPt.y);
  dbgCrossH.setAttribute('display', 'block');
  dbgCrossV.setAttribute('x1', tapPt.x); dbgCrossV.setAttribute('y1', tapPt.y - sz);
  dbgCrossV.setAttribute('x2', tapPt.x); dbgCrossV.setAttribute('y2', tapPt.y + sz);
  dbgCrossV.setAttribute('display', 'block');

  // Candidate dots with distance labels
  dbgCandidatesG.innerHTML = '';
  lastCandidates.forEach((c, i) => {
    const s = strokes[c.strokeIdx];
    // Find closest point on stroke for dot placement
    let cpx, cpy;
    if (s.curved && s.cx !== undefined) {
      let minDist = Infinity;
      for (let t = 0; t <= 1; t += 0.05) {
        const mt = 1 - t;
        const x = mt * mt * s.x1 + 2 * mt * t * s.cx + t * t * s.x2;
        const y = mt * mt * s.y1 + 2 * mt * t * s.cy + t * t * s.y2;
        const d = Math.hypot(x - tapPt.x, y - tapPt.y);
        if (d < minDist) { minDist = d; cpx = x; cpy = y; }
      }
    } else {
      const dx = s.x2 - s.x1, dy = s.y2 - s.y1, lq = dx * dx + dy * dy;
      let t = lq > 0 ? ((tapPt.x - s.x1) * dx + (tapPt.y - s.y1) * dy) / lq : 0;
      t = Math.max(0, Math.min(1, t));
      cpx = s.x1 + t * dx;
      cpy = s.y1 + t * dy;
    }

    const isWinner = i === 0;
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', cpx); dot.setAttribute('cy', cpy);
    dot.setAttribute('r', isWinner ? 4 : 3);
    dot.setAttribute('fill', isWinner ? '#0f0' : '#f90');
    dot.setAttribute('opacity', isWinner ? '0.9' : '0.6');
    dbgCandidatesG.appendChild(dot);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', cpx + 5); label.setAttribute('y', cpy - 3);
    label.setAttribute('fill', isWinner ? '#0f0' : '#f90');
    label.setAttribute('font-size', '6');
    label.setAttribute('font-family', 'monospace');
    label.textContent = `s${c.strokeIdx}:${c.dist.toFixed(1)}`;
    dbgCandidatesG.appendChild(label);
  });

  // Distance summary
  dbgDistText.textContent = lastCandidates.length > 0
    ? lastCandidates.map(c => `s${c.strokeIdx}:${c.dist.toFixed(1)}`).join(' ')
    : 'no candidates';
}

// ═══════════════════════════════════════════════════════
// HIT DETECTION
// ═══════════════════════════════════════════════════════
function findEndpointAt(px, py, radius) {
  let closest = null;
  let closestDist = Infinity;
  strokes.forEach((s, i) => {
    const d1 = Math.hypot(s.x1 - px, s.y1 - py);
    if (d1 < radius && d1 < closestDist) {
      closestDist = d1;
      closest = { strokeIdx: i, endpoint: 'start', x: s.x1, y: s.y1, dist: d1 };
    }
    const d2 = Math.hypot(s.x2 - px, s.y2 - py);
    if (d2 < radius && d2 < closestDist) {
      closestDist = d2;
      closest = { strokeIdx: i, endpoint: 'end', x: s.x2, y: s.y2, dist: d2 };
    }
  });
  return closest;
}

// Core fix: returns CLOSEST match, not first-match
function findStrokeMidAt(px, py, threshold) {
  lastCandidates = [];

  for (let i = 0; i < strokes.length; i++) {
    const s = strokes[i];
    const strokeLen = Math.hypot(s.x2 - s.x1, s.y2 - s.y1);
    const isShort = strokeLen < threshold * 2;
    const endpointExcl = isShort ? Math.min(threshold * 0.3, strokeLen * 0.2) : threshold;

    // Skip if near endpoints (those are handled by findEndpointAt)
    if (Math.hypot(s.x1 - px, s.y1 - py) < endpointExcl) continue;
    if (Math.hypot(s.x2 - px, s.y2 - py) < endpointExcl) continue;

    let dist;
    if (s.curved && s.cx !== undefined) {
      let minDist = Infinity;
      for (let t = 0.1; t <= 0.9; t += 0.1) {
        const mt = 1 - t;
        const x = mt * mt * s.x1 + 2 * mt * t * s.cx + t * t * s.x2;
        const y = mt * mt * s.y1 + 2 * mt * t * s.cy + t * t * s.y2;
        minDist = Math.min(minDist, Math.hypot(x - px, y - py));
      }
      dist = minDist;
    } else {
      const dx = s.x2 - s.x1, dy = s.y2 - s.y1, lq = dx * dx + dy * dy;
      let t = lq > 0 ? ((px - s.x1) * dx + (py - s.y1) * dy) / lq : 0;
      t = Math.max(0, Math.min(1, t));
      dist = Math.hypot(px - (s.x1 + t * dx), py - (s.y1 + t * dy));
    }

    if (dist < threshold) {
      lastCandidates.push({ strokeIdx: i, dist });
    }
  }

  if (lastCandidates.length === 0) return null;

  // Sort by distance — return closest, not first-match
  lastCandidates.sort((a, b) => a.dist - b.dist);
  return lastCandidates[0];
}

function snapToGrid(x, y) {
  const col = Math.round((x - MX) / SP);
  const row = Math.round((y - MY) / SP);
  return {
    x: MX + Math.max(0, Math.min(COLS, col)) * SP,
    y: MY + Math.max(ROWS_START, Math.min(ROWS_END, row)) * SP
  };
}

// All valid grid dot positions
function allDots() {
  const d = [];
  for (let r = ROWS_START; r <= ROWS_END; r++)
    for (let c = 0; c <= COLS; c++)
      d.push({ x: MX + c * SP, y: MY + r * SP, c, r });
  return d;
}

// Find nearest grid dot within threshold (screen pixels converted to SVG)
function findNearestDot(px, py, threshold) {
  let best = null, bestDist = threshold;
  for (const d of allDots()) {
    const dist = Math.hypot(d.x - px, d.y - py);
    if (dist < bestDist) { bestDist = dist; best = d; }
  }
  return best;
}

function dotEq(a, b) {
  return a && b && a.x === b.x && a.y === b.y;
}

function clampControlPoint(x1, y1, x2, y2, cx, cy) {
  const midX = (x1 + x2) / 2, midY = (y1 + y2) / 2;
  const maxDist = SP * 2.5;
  const dist = Math.hypot(cx - midX, cy - midY);
  if (dist > maxDist) {
    const scale = maxDist / dist;
    cx = midX + (cx - midX) * scale;
    cy = midY + (cy - midY) * scale;
  }
  return { cx, cy };
}

// ═══════════════════════════════════════════════════════
// UNDO
// ═══════════════════════════════════════════════════════
function pushUndo() {
  undoStack.push(JSON.parse(JSON.stringify(strokes)));
  if (undoStack.length > 40) undoStack.shift();
}

function popUndo() {
  if (undoStack.length) {
    strokes = undoStack.pop();
    rebuildStrokes();
  }
}

function rebuildStrokes() {
  strokesG.innerHTML = '';
  strokeEls = [];
  strokes.forEach(s => {
    const el = createStrokeEl(s);
    strokesG.appendChild(el);
    strokeEls.push(el);
  });
  drawEndpointDots();
  updateGridDotVisuals();
  updateSelectionVisual();
}

// ═══════════════════════════════════════════════════════
// MODE SWITCHING
// ═══════════════════════════════════════════════════════
function setMode(m) {
  mode = m;
  drawBtn.classList.toggle('active', m === 'DRAW');
  editBtn.classList.toggle('active', m === 'EDIT');
  // Clear state when switching modes
  selectedItem = null;
  dragInfo = null;
  drawStartDot = null;
  drawHoverDot = null;
  state = 'IDLE';
  updatePreviewLine();
  updateGridDotVisuals();
  updateSelectionVisual();
  updateDebugOverlays(null);
  updateInfo();
  console.log(`Mode → ${m}`);
}

// ═══════════════════════════════════════════════════════
// DRAW MODE HANDLERS
// ═══════════════════════════════════════════════════════
function handleDrawStart(p) {
  const t = svgThresholds();
  const snapRadius = SCREEN_ENDPOINT_RADIUS * t.scale;  // use endpoint radius for snap
  const d = findNearestDot(p.x, p.y, snapRadius);
  if (d) {
    drawStartDot = d;
    drawHoverDot = d;
    state = 'DRAWING';
    updateGridDotVisuals();
    console.log(`DRAW start at (${d.x},${d.y})`);
  } else {
    state = 'IDLE';
  }
  updateDebugOverlays(p, snapRadius);
}

function handleDrawMove(p) {
  if (state !== 'DRAWING' || !drawStartDot) return;
  const t = svgThresholds();
  const snapRadius = SCREEN_ENDPOINT_RADIUS * t.scale;
  const d = findNearestDot(p.x, p.y, snapRadius);
  const oldHover = drawHoverDot;
  drawHoverDot = d;
  // Update preview line directly (no DOM rebuild — safe for iOS)
  if (drawHoverDot) {
    const endX = drawHoverDot.x, endY = drawHoverDot.y;
    if (endX !== drawStartDot.x || endY !== drawStartDot.y) {
      previewLineEl.setAttribute('x1', drawStartDot.x);
      previewLineEl.setAttribute('y1', drawStartDot.y);
      previewLineEl.setAttribute('x2', endX);
      previewLineEl.setAttribute('y2', endY);
      previewLineEl.setAttribute('display', 'block');
    } else {
      previewLineEl.setAttribute('display', 'none');
    }
  } else {
    // Show line to raw finger position when no snap
    previewLineEl.setAttribute('x1', drawStartDot.x);
    previewLineEl.setAttribute('y1', drawStartDot.y);
    previewLineEl.setAttribute('x2', p.x);
    previewLineEl.setAttribute('y2', p.y);
    previewLineEl.setAttribute('display', 'block');
  }
  // Only update dot visuals if hover changed
  if (!dotEq(oldHover, drawHoverDot)) {
    updateGridDotVisuals();
  }
}

function handleDrawEnd(p) {
  if (state !== 'DRAWING' || !drawStartDot) {
    state = 'IDLE';
    return;
  }
  const t = svgThresholds();
  const snapRadius = SCREEN_ENDPOINT_RADIUS * t.scale;
  const d = findNearestDot(p.x, p.y, snapRadius);
  if (d && !dotEq(d, drawStartDot)) {
    // Create new stroke
    pushUndo();
    strokes.push({ x1: drawStartDot.x, y1: drawStartDot.y, x2: d.x, y2: d.y, curved: false });
    // Add the new stroke element
    const el = createStrokeEl(strokes[strokes.length - 1]);
    strokesG.appendChild(el);
    strokeEls.push(el);
    drawEndpointDots();
    console.log(`DRAW stroke (${drawStartDot.x},${drawStartDot.y})→(${d.x},${d.y})`);
  } else {
    console.log(`DRAW cancelled (same dot or no snap)`);
  }
  drawStartDot = null;
  drawHoverDot = null;
  state = 'IDLE';
  previewLineEl.setAttribute('display', 'none');
  updateGridDotVisuals();
  updateDebugOverlays(null);
}

// ═══════════════════════════════════════════════════════
// EDIT MODE HANDLERS (Strategy B: Sticky DRAG_PENDING)
// ═══════════════════════════════════════════════════════
function handleEditStart(p) {
  const t = svgThresholds();

  if (selectedItem) {
    // Any touch when selected → DRAG_PENDING
    pushUndo();
    state = 'DRAG_PENDING';
    if (selectedItem.type === 'stroke') {
      const s = strokes[selectedItem.strokeIdx];
      dragInfo = {
        type: 'curve', strokeIdx: selectedItem.strokeIdx,
        cx: s.curved ? s.cx : (s.x1 + s.x2) / 2,
        cy: s.curved ? s.cy : (s.y1 + s.y2) / 2
      };
    } else {
      dragInfo = {
        type: 'dot', strokeIdx: selectedItem.strokeIdx,
        endpoint: selectedItem.endpoint,
        startX: selectedItem.x, startY: selectedItem.y
      };
    }
    console.log(`DRAG_PENDING (sticky)`);
    updateDebugOverlays(p, t.strokeMidThresh);
    return;
  }

  // Nothing selected — look for element
  const ep = findEndpointAt(p.x, p.y, t.endpointRadius);
  const sm = findStrokeMidAt(p.x, p.y, t.strokeMidThresh);
  state = 'EDIT_PENDING';
  console.log(`EDIT_PENDING ep=${ep ? 's' + ep.strokeIdx : '-'} sm=${sm ? 's' + sm.strokeIdx : '-'} candidates=${lastCandidates.length}`);
  updateDebugOverlays(p, t.strokeMidThresh);
}

function handleEditMove(p) {
  const t = svgThresholds();

  if (state === 'DRAG_PENDING') {
    const dist = Math.hypot(p.x - pressStart.x, p.y - pressStart.y);
    if (dist > t.dragPromote) {
      state = 'DRAGGING';
      dbgStateText.textContent = `${mode}:DRAGGING`;
      console.log(`Promoted DRAG_PENDING→DRAGGING (dist=${dist.toFixed(1)} > ${t.dragPromote.toFixed(1)})`);
    } else {
      return;
    }
  }

  if (state === 'DRAGGING') {
    performDrag(p);
  }
}

function handleEditEnd(p) {
  const t = svgThresholds();

  if (state === 'DRAG_PENDING') {
    // Was a tap, not a drag — roll back undo
    popUndo();
    dragInfo = null;
    console.log(`DRAG_PENDING→tap, rolled back undo`);
    handleTapSelection(p, t);
    return;
  }

  if (state === 'DRAGGING') {
    finishDrag();
    return;
  }

  if (state === 'EDIT_PENDING') {
    handleTapSelection(p, t);
  }
}

// ═══════════════════════════════════════════════════════
// DISPATCH TO MODE
// ═══════════════════════════════════════════════════════
function handleTouchStart(p) {
  if (mode === 'DRAW') handleDrawStart(p);
  else handleEditStart(p);
}
function handleTouchMove(p) {
  if (mode === 'DRAW') handleDrawMove(p);
  else handleEditMove(p);
}
function handleTouchEnd(p) {
  if (mode === 'DRAW') handleDrawEnd(p);
  else handleEditEnd(p);
}

// ═══════════════════════════════════════════════════════
// SHARED DRAG LOGIC
// ═══════════════════════════════════════════════════════
function performDrag(p) {
  if (!dragInfo) return;

  if (dragInfo.type === 'curve') {
    const s = strokes[dragInfo.strokeIdx];
    const clamped = clampControlPoint(s.x1, s.y1, s.x2, s.y2, p.x, p.y);
    s.curved = true;
    s.cx = clamped.cx;
    s.cy = clamped.cy;
    updateStrokeEl(dragInfo.strokeIdx);
    updateSelectionVisual();
  } else if (dragInfo.type === 'dot') {
    const snapped = snapToGrid(p.x, p.y);
    const s = strokes[dragInfo.strokeIdx];
    const oldX = dragInfo.endpoint === 'start' ? s.x1 : s.x2;
    const oldY = dragInfo.endpoint === 'start' ? s.y1 : s.y2;
    strokes.forEach((stroke, i) => {
      let changed = false;
      if (stroke.x1 === oldX && stroke.y1 === oldY) { stroke.x1 = snapped.x; stroke.y1 = snapped.y; changed = true; }
      if (stroke.x2 === oldX && stroke.y2 === oldY) { stroke.x2 = snapped.x; stroke.y2 = snapped.y; changed = true; }
      if (changed) updateStrokeEl(i);
    });
    if (selectedItem) { selectedItem.x = snapped.x; selectedItem.y = snapped.y; }
    dragInfo.startX = snapped.x;
    dragInfo.startY = snapped.y;
    drawEndpointDots();
    updateSelectionVisual();
  }
}

function finishDrag() {
  console.log(`Drag finished (${dragInfo?.type})`);
  dragInfo = null;
  state = 'SELECTED';
  updateSelectionVisual();
  updateDebugOverlays(null);
}

function handleTapSelection(p, t) {
  if (!pressStart) { state = 'IDLE'; updateDebugOverlays(null); return; }
  const dist = Math.hypot(p.x - pressStart.x, p.y - pressStart.y);
  const duration = Date.now() - pressStart.time;
  const wasTap = dist < t.tapThresh && duration < 300;

  if (!wasTap) {
    console.log(`Not a tap (dist=${dist.toFixed(1)}, dur=${duration}ms)`);
    state = selectedItem ? 'SELECTED' : 'IDLE';
    updateSelectionVisual();
    updateDebugOverlays(pressStart, t.strokeMidThresh);
    return;
  }

  // Use pressStart position for hit detection
  const ep = findEndpointAt(pressStart.x, pressStart.y, t.endpointRadius);
  const sm = findStrokeMidAt(pressStart.x, pressStart.y, t.strokeMidThresh);

  let selectEndpoint = false, selectStroke = false;
  if (ep && sm) {
    // Both found — short stroke tiebreaker or distance comparison
    const s = strokes[sm.strokeIdx];
    const strokeLen = Math.hypot(s.x2 - s.x1, s.y2 - s.y1);
    if (sm.strokeIdx === ep.strokeIdx && strokeLen < SP * 2) {
      selectStroke = true;
      console.log(`Short stroke tiebreaker → stroke`);
    } else {
      selectEndpoint = ep.dist < sm.dist;
      selectStroke = !selectEndpoint;
    }
  } else if (ep) {
    selectEndpoint = true;
  } else if (sm) {
    selectStroke = true;
  }

  if (selectEndpoint) {
    selectedItem = { type: 'dot', strokeIdx: ep.strokeIdx, endpoint: ep.endpoint, x: ep.x, y: ep.y };
    state = 'SELECTED';
    console.log(`Selected DOT (stroke ${ep.strokeIdx}, ${ep.endpoint}, dist=${ep.dist.toFixed(1)})`);
  } else if (selectStroke) {
    selectedItem = { type: 'stroke', strokeIdx: sm.strokeIdx };
    state = 'SELECTED';
    console.log(`Selected STROKE ${sm.strokeIdx} (dist=${sm.dist.toFixed(1)}, candidates=${lastCandidates.length})`);
  } else {
    selectedItem = null;
    state = 'IDLE';
    console.log(`Deselected (tap empty)`);
  }

  updateSelectionVisual();
  updateDebugOverlays(pressStart, t.strokeMidThresh);
}

// ═══════════════════════════════════════════════════════
// TOUCH EVENT HANDLERS
// ═══════════════════════════════════════════════════════
svg.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const p = svgPt(touch.clientX, touch.clientY);
  pressStart = { x: p.x, y: p.y, time: Date.now() };
  console.log(`touchstart (${p.x.toFixed(1)},${p.y.toFixed(1)}) state=${state}`);
  handleTouchStart(p);
}, { passive: false });

svg.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const p = svgPt(touch.clientX, touch.clientY);
  handleTouchMove(p);
}, { passive: false });

svg.addEventListener('touchend', e => {
  e.preventDefault();
  const touch = e.changedTouches[0];
  const p = svgPt(touch.clientX, touch.clientY);
  console.log(`touchend (${p.x.toFixed(1)},${p.y.toFixed(1)}) state=${state}`);
  handleTouchEnd(p);
  pressStart = null;
}, { passive: false });

svg.addEventListener('touchcancel', () => {
  console.log('touchcancel');
  state = selectedItem ? 'SELECTED' : 'IDLE';
  dragInfo = null;
  pressStart = null;
  drawStartDot = null;
  drawHoverDot = null;
  if (previewLineEl) previewLineEl.setAttribute('display', 'none');
  updateGridDotVisuals();
  updateDebugOverlays(null);
}, { passive: false });

// ── Mouse events (desktop testing) ──
let mouseDown = false;

svg.addEventListener('mousedown', e => {
  mouseDown = true;
  const p = svgPt(e.clientX, e.clientY);
  pressStart = { x: p.x, y: p.y, time: Date.now() };
  console.log(`mousedown (${p.x.toFixed(1)},${p.y.toFixed(1)}) state=${state}`);
  handleTouchStart(p);
});

svg.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const p = svgPt(e.clientX, e.clientY);
  handleTouchMove(p);
});

svg.addEventListener('mouseup', e => {
  if (!mouseDown) return;
  mouseDown = false;
  const p = svgPt(e.clientX, e.clientY);
  console.log(`mouseup (${p.x.toFixed(1)},${p.y.toFixed(1)}) state=${state}`);
  handleTouchEnd(p);
  pressStart = null;
});

// ═══════════════════════════════════════════════════════
// UI CONTROLS
// ═══════════════════════════════════════════════════════
drawBtn.addEventListener('click', () => setMode('DRAW'));
editBtn.addEventListener('click', () => setMode('EDIT'));

document.getElementById('resetBtn').addEventListener('click', () => {
  strokes = JSON.parse(JSON.stringify(initialStrokes));
  state = 'IDLE';
  selectedItem = null;
  dragInfo = null;
  drawStartDot = null;
  drawHoverDot = null;
  undoStack = [];
  lastCandidates = [];
  rebuildStrokes();
  updatePreviewLine();
  updateGridDotVisuals();
  updateDebugOverlays(null);
  console.log('Reset');
});

document.getElementById('undoBtn').addEventListener('click', () => {
  popUndo();
  selectedItem = null;
  state = 'IDLE';
  dragInfo = null;
  drawStartDot = null;
  drawHoverDot = null;
  previewLineEl.setAttribute('display', 'none');
  updateGridDotVisuals();
  updateDebugOverlays(null);
  console.log('Undo');
});

window.addEventListener('resize', updateInfo);
window.addEventListener('orientationchange', updateInfo);

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildScene();
updateInfo();
updateGridDotVisuals();
updateDebugOverlays(null);
console.log('Touch Test ready (Draw+Edit, iPad, closest-match)');
console.log('Strokes: 0,1=parallel verticals(31px apart) 2=diagonal 3=short horiz 4=curved');
</script>
</body>
